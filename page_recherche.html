<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Résultats de recherche — KINKA.FR">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche - KINKA.FR</title>
        <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="icon" type="image/png" href="/asset/image/LogoProjetFilRouge.png">

    <!-- Styles -->
    <link rel="stylesheet" href="/asset/css/kinka-shared.css">
    <link rel="stylesheet" href="/asset/css/page_recherche.css">
    <link rel="stylesheet" href="/asset/css/translate.css">
    <link rel="stylesheet" href="/asset/css/darkmode.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <nav>
            <a href="/page_accueil.html" class="logo">
                <img src="/asset/image/LogoProjetFilRouge.png" alt="Logo Kinka" class="logo-image">
                <span class="logo-text">KINKA<span class="fr">.FR</span></span>
            </a>
            
            <!-- Barre de recherche (sans formulaire) -->
            <div class="search-bar">
                <span class="material-symbols-outlined search-icon">search</span>
                <input type="text" placeholder="Rechercher un manga, un auteur..." id="search-input" autocomplete="off">
            </div>
            
                        <div class="nav-menu">
                <a href="/page_accueil.html">Accueil</a>
                <a href="/page_catalogue.html">Catalogue</a>
                <a href="/page_promotion.html">Promotions</a>
            </div>
            
                                    <div class="nav-actions">
                <button class="icon-btn" onclick="window.location.href='/page_favoris.html'" title="Mes favoris" id="favoris-btn">
                    <span class="material-symbols-outlined">favorite</span>
                    <span class="nav-badge" id="favoris-count" style="display:none">0</span>
                </button>
                <button class="icon-btn" onclick="window.location.href='/page_profil.html'" title="Mon profil">
                    <span class="material-symbols-outlined">person</span>
                </button>
                <button class="connect-btn" onclick="window.location.href='/pageLogIn.html'">Se connecter</button>
                <button class="icon-btn" onclick="window.location.href='/page_panier.html'" title="Mon panier">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    <span class="panier-count" id="panier-count" style="display:none">0</span>
                </button>
            </div>
        </nav>
    </header>
    <div class="breadcrumb-bar">
        <div class="breadcrumb">
            <a href="/page_accueil.html">Accueil</a>
            <span>&#8250;</span>
            <span class="breadcrumb-current">Recherche</span>
        </div>
    </div>


    <!-- MAIN CONTENT -->
    <main class="container">
        
        <!-- SEARCH RESULTS HEADER -->
        <section class="search-header">
            <div class="results-info">
                <p class="results-label">Résultats de recherche pour</p>
                <h1 class="search-query">"..."</h1>
                <p class="results-count">0 manga trouvé</p>
            </div>
            <div class="search-tags">
                <button class="tag active">Shōnen</button>
                <button class="tag">Aventure</button>
                <button class="tag">Eiichiro Oda</button>
            </div>
        </section>

        <div class="search-layout">
            
            <!-- SIDEBAR FILTERS (statique) -->
            <aside class="filters-sidebar">
                <!-- ... inchangé ... -->
            </aside>

            <!-- RESULTS AREA -->
            <div class="results-area">
                
                <div class="results-toolbar">
                    <p class="results-summary">0 résultats • triés par pertinence</p>
                    <div class="toolbar-actions">
                        <span class="sort-label">Tri :</span>
                        <select class="sort-select">
                            <option>Meilleures ventes</option>
                            <option>Prix croissant</option>
                            <option>Prix décroissant</option>
                            <option>Nouveautés</option>
                        </select>
                    </div>
                </div>

                <!-- GRILLE VIDÉ – REMPLIE DYNAMIQUEMENT PAR page_recherche.js -->
                <div class="products-grid"></div>

                <!-- Load More & Pagination (statiques) -->
                <div class="load-more-section">
                    <button class="btn-load-more">
                        <span class="material-symbols-outlined">expand_more</span>
                        Affiner encore la recherche
                    </button>
                </div>
                <div class="pagination">
                    <!-- ... inchangé ... -->
                </div>

            </div>

        </div>

    </main>

    <!-- FOOTER (identique) -->
    <footer>
        <!-- ... -->
    </footer>
    

    <!-- Scripts -->
    <script src="/asset/js/kinka-api-client.js"></script>
    <script src="/asset/js/mangadb.js"></script>
    <script src="/asset/js/authentification.js"></script>
    <script src="/asset/js/panier.js"></script>
    <script src="/asset/js/page_recherche.js"></script>
    <script src="/asset/js/recherche.js"></script>
    <script src="/asset/js/favoris.js"></script>
    <script src="/asset/js/darkmode.js"></script>
    <script src="/asset/js/translate.js"></script>

    <script>
    // Header scroll effect
    (function(){
        var h = document.querySelector('header');
        if (!h) return;
        window.addEventListener('scroll', function(){
            h.classList.toggle('scrolled', window.scrollY > 10);
        }, {passive: true});
    })();
    </script>
    </body>
</html>
